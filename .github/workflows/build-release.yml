name: Build and Release App

on:
  push:
    tags:
      - 'v*' # Automatically trigger on version tags (e.g. v0.1.3)
  workflow_dispatch: # Allows you to manually trigger it from the Actions tab

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    # Needs permission to create a release in your repository
    permissions:
      contents: write
      
    strategy:
      matrix:
        # We build across all 3 major platforms!
        os: [windows-latest, ubuntu-latest, macos-latest]
        
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Build and Publish Release
        env:
          # GitHub Actions automatically provides this token!
          # It gives electron-builder permission to create a Release for your repo.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm build
          pnpm exec electron-builder --publish always
