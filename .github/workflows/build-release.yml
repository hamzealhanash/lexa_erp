name: Build and Release App

on:
  push:
    tags:
      - 'v*' 
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    permissions:
      contents: write
      
    strategy:
      matrix:
        # Note: macos-latest is now ARM-based (M1/M2). 
        # Use macos-13 if you specifically need Intel builds.
        os: [windows-latest, ubuntu-latest, macos-latest]
        
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # This will look specifically for package-lock.json
          # cache: 'npm'

      - name: Install Dependencies
        # 'npm ci' is preferred for CI/CD as it ensures 
        # a clean install exactly matching your lockfile.
        run: npm install

      - name: Build and Publish Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run build
          npx electron-builder --publish always
